    ErrorResponse:
      type: object
      description: |-
        The unified error envelope returned by ``core.exceptions_handler``.

        Every non-2xx response the API produces has exactly this shape::

            {"code": "validation_error", "message": "…", "details": null | {…} | […]}

        - ``code``    machine-readable error code (e.g. ``not_found``, ``conflict``).
        - ``message`` human-readable description, safe to surface to end users.
        - ``details`` optional structured context: ``null`` for most errors, an
          object of field→errors for validation, or a list — never a bare string
          you should parse.
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
        details:
          nullable: true
          description: Optional structured context (object/array) or null.
      required:
      - code
      - message
    EventEnum:
      enum:
      - booking.created
      - booking.confirmed
      - booking.cancelled
      - booking.started
      - booking.completed
      - booking.no_show
      - queue.advanced
      - payment.completed
      - payment.cancelled
      - refund.requested
      - refund.approved
      - refund.completed
      - refund.rejected
      - review.replied
      - carwash.verification_rejected
      - carwash.verification_approved
      - booking.created.staff
      - payment.completed.staff
      - refund.requested.staff
      - review.created.staff
      - warehouse.stock.low.staff
      - verification.mismatch.staff
      - review.flagged.admin
      type: string
      description: |-
        * `booking.created` - Booking created
        * `booking.confirmed` - Booking confirmed
        * `booking.cancelled` - Booking cancelled
        * `booking.started` - Booking started
        * `booking.completed` - Booking completed
        * `booking.no_show` - Booking no-show
        * `queue.advanced` - Queue advanced
        * `payment.completed` - Payment completed
        * `payment.cancelled` - Payment cancelled
        * `refund.requested` - Refund requested
        * `refund.approved` - Refund approved
        * `refund.completed` - Refund completed
        * `refund.rejected` - Refund rejected
        * `review.replied` - Review reply received
        * `carwash.verification_rejected` - Carwash verification rejected
        * `carwash.verification_approved` - Carwash verification approved
        * `booking.created.staff` - New booking (staff)
        * `payment.completed.staff` - Payment received (staff)
        * `refund.requested.staff` - Refund requested (staff)
        * `review.created.staff` - New review (staff)
        * `warehouse.stock.low.staff` - Low stock (staff)
        * `verification.mismatch.staff` - Vehicle mismatch (staff)
        * `review.flagged.admin` - Review flagged (admin)
