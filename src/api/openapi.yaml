          type: array
          items:
            $ref: '#/components/schemas/BookingItemOutput'
        verification:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        price_locked:
          type: boolean
          readOnly: true
        qr:
          type: object
          additionalProperties: {}
          nullable: true
          description: |-
            G8 — the staff scan-to-start QR payload, or null.

            Present ONLY when the booking has been customer-confirmed
            (``customer_confirmed_at`` set) AND is still startable
            (status pending/confirmed). Otherwise null — a started/completed/
            cancelled booking, or one not yet confirmed, has nothing to scan.

            The ``token`` is an OPAQUE, STABLE handle that encodes nothing but the
            booking identity: it is the booking's primary-key UUID (hex, no
            dashes). It is NOT a secret and NOT one-time — when staff scan it the
            server resolves the booking and runs the existing start gate, where
            staff auth + the customer-confirmation requirement are the real
            security controls. ``short_code`` is the first 6 hex chars formatted
            ``"a7f3-0c"`` as a human fallback a cashier can read aloud / type.
            ``expires_at`` mirrors the guest BookingConfirmationToken's expiry when
            one exists (the QR is meaningful for the same window), else null — an
            absent/expired guest token does not invalidate the scan-to-start handle.
          readOnly: true
        progress_pct:
          type: integer
          description: |-
            G15 — wash progress 0–100 from started_at + expected end.

            0 until the wash starts (or when duration is unknown); clamped to
            [0, 100] so a booking running over time reads 100, never more.
          readOnly: true
        stages:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: |-
            G15 — derived lifecycle stages from EXISTING timestamps (no new model).

            Each stage is ``{key, label, status, at}`` where status is one of
            done / current / pending. ``at`` is the timestamp the stage was reached
            (null while pending). Cheap: reads only fields already on the booking.
          readOnly: true
        cancellation_policy:
          type: object
          additionalProperties: {}
          nullable: true
          description: |-
            A2 — cancellation policy for the carwash, derived from BookingConfig.

            Attached in-place by the detail service as ``_cancellation_policy``.
            Returns null when not attached (list/WS paths skip the config fetch).
          readOnly: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
        cancellation_reason_code:
          type: string
          nullable: true
