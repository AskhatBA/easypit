        Creates a `PaymentIntent` (e.g. a Kaspi QR charge) for the booking and returns the details the client needs to complete payment — a QR payload and/or a hosted `pay_url`. Only the booking's own customer may pay for it.

        **Idempotency**: send an `Idempotency-Key` header to safely retry (e.g. after a timeout); replaying the same key returns the original intent instead of creating a new charge. Without the header, the request is keyed on `booking:<booking_id>`, so calling this again for the same booking re-fetches the existing intent rather than starting a second one.

        Online payments must be enabled for the carwash's provider, otherwise this returns `404`.
