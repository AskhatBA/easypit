        only — the mobile app should authenticate with the JWT `Authorization: Bearer
        <access_token>` scheme instead.'
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: https://api.easypit.kz
  description: Production
- url: http://localhost:8010
  description: Local dev
tags:
- name: Authentication
  description: Sign up and sign in with a phone/email one-time code, then obtain and
    refresh the JWT tokens every other endpoint requires.
- name: Profile
  description: 'The signed-in customer''s account: profile details and preferences.'
- name: Vehicles
  description: The customer's saved cars plus the read-only brand/model/body-type
    catalog used to build them.
- name: Carwashes
  description: 'Discover carwashes: browse and search locations, view services, pricing
    per body type, amenities, photos and operating hours.'
- name: Businesses
  description: Public profiles of the businesses (tenants) that operate the carwashes.
- name: Bookings
  description: Create, view, reschedule and cancel wash bookings, including the token-gated
