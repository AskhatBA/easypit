          type: string
          format: date-time
          nullable: true
        queue_position:
          type: integer
          nullable: true
          description: |-
            Queue position from the active QueueEntry (pre-arrival visibility).

            Returns the position when the booking has an active queue entry,
            so the customer app can show "you are Nth in line" BEFORE arrival.
            The queue_entry reverse relation is prefetched on list repos (no N+1).
          readOnly: true
        booked_by_id:
          type: string
          format: uuid
        booked_by:
          allOf:
          - $ref: '#/components/schemas/UserRef'
          readOnly: true
