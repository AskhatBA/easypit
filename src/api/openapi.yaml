openapi: 3.0.3
info:
  title: JU Client API
  version: 1.0.0
  description: |
    Customer-facing REST API for the **JU / Easypit** carwash platform — the surface
    the mobile app talks to. Admin and business (tenant) endpoints are intentionally
    excluded from this document.

    ## Base URL

    Pick the server from the dropdown above: `https://api.easypit.kz` in production,
    `http://localhost:8010` for local development. All paths below are relative to it
    and versioned under `/v1/`.

    ## Authentication

    Almost every endpoint requires a **JWT access token** sent as a Bearer token:

    ```
    Authorization: Bearer <access_token>
    ```

    Obtain the token pair from the **Authentication** endpoints (request a one-time
    code, then verify it). Access tokens are short-lived (1 hour); when one expires,
    exchange your long-lived refresh token (30 days) at the token-refresh endpoint
    for a new access token rather than forcing the user to log in again. A missing or
    expired token yields `401` with `code: "not_authenticated"`. Endpoints that are
    explicitly public (parts of the catalog, guest booking confirmation) need no
    header.

    ## Error envelope

    Every non-2xx response uses one consistent shape:

    ```json
    { "code": "validation_error", "message": "Human-readable message", "details": null }
    ```

    `code` is a stable machine-readable string, `message` is safe to display, and
    `details` is `null` for most errors or an object/array of field errors for
    validation failures (`400`).

    ## Pagination

    List endpoints are page-numbered and wrap results in:

    ```json
    { "count": 123, "next": "…?page=3", "previous": "…?page=1", "results": [ … ] }
    ```

    Control paging with `?page=<n>` and `?page_size=<n>` (default 20, max 100).

    ## Localization

    Endpoints with translatable content accept `?lang=en|kk|ru`. Resolution order is
    the `?lang=` query param → the `Accept-Language` header → default `ru`.
  contact:
    name: JU Platform API
paths:
  /v1/auth/customer/otp/request/:
    post:
      operationId: auth_customer_otp_request_create
      description: Send a one-time code (WhatsApp/SMS/email, decided server-side)
        to a phone or email for customer login or registration. Provide exactly one
        of `phone` or `email`. This is the first step of the OTP flow — follow up
        with `POST /v1/auth/customer/otp/verify/` using the code the customer receives.
        Public endpoint, rate-limited.
      summary: Request a one-time code
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOTPCustomerRequest'
            examples:
              RequestByPhone:
                value:
                  phone: '+77071234567'
                  purpose: login
                summary: Request by phone
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTPSentResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
  /v1/auth/customer/otp/verify/:
    post:
      operationId: auth_customer_otp_verify_create
      description: Verify the code sent by `POST /v1/auth/customer/otp/request/` and,
        on success, log in (or auto-register, for `purpose=registration`) the customer.
        Returns a fresh JWT access/refresh token pair plus the user and session records.
        `is_new_user` tells the client whether an account was just created — use it
        to decide whether to show onboarding. Optionally pass `profile` to seed the
        profile on first registration. Public endpoint, rate-limited.
      summary: Verify OTP and obtain tokens
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTPCustomerRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
  /v1/auth/invite/{token}/:
    get:
      operationId: auth_invite_retrieve
      description: 'Display-safe preview of a tenant invitation, keyed by the opaque
        invite `token` from the invite link/email. Used to render the onboarding screen
        (tenant name, role, pre-filled contact info) before the invitee sets a password.
        Never 404s — an unknown or expired token yields `200` with `valid: false`
        instead, so the client can show a friendly "this invite is no longer valid"
        screen. Public endpoint.'
      summary: Preview a business invite
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePreview'
              examples:
                ExpiredOrUnknownToken:
                  value:
                    valid: false
                  summary: Expired or unknown token
          description: ''
  /v1/auth/invite/{token}/accept/:
    post:
      operationId: auth_invite_accept_create
      description: Claim a tenant invitation by `token`, set a password and (optionally)
        complete profile fields. On success the invitee's account is active and ready
        to log in via `POST /v1/auth/login/` — this endpoint does not itself return
        tokens. Public endpoint.
      summary: Accept a business invite
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotFound:
                  value:
                    code: not_found
                    message: Resource not found
                    details: null
                  summary: Not found
          description: The requested resource does not exist (or is not visible to
            you).
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                VersionConflict:
                  value:
                    code: conflict
                    message: The resource was modified by another request. Please
                      refresh and retry.
                    details: null
                  summary: Version conflict
          description: Conflict — the resource changed since you read it. Re-fetch
            to get the current ``version`` and retry the write (optimistic-locking
            guard).
  /v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Log in with an `identifier` (email or phone) and `password`. Intended
        for business users (tenant owners/staff) who have a password set — pure customer
        accounts should use the OTP flow instead and get a `401` here (`"Customers
        should use OTP authentication"`). Returns a fresh JWT access/refresh token
        pair, the user and the new session. Repeated failures lock the account temporarily.
        Public endpoint, rate-limited.
      summary: Log in with password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: Change the signed-in user's password after confirming the current
        one. On success **all sessions are revoked** (including the current one) so
        the client must discard its tokens and prompt the user to log in again with
        the new password.
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/password/reset/request/:
    post:
      operationId: auth_password_reset_request_create
      description: Send a one-time reset code to `email`. Always returns `200` with
        a generic message regardless of whether the email is registered, so the response
        never reveals account existence. Follow up with `POST /v1/auth/password/reset/verify/`.
        Public endpoint, rate-limited.
      summary: Request a password reset code
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
  /v1/auth/password/reset/verify/:
    post:
      operationId: auth_password_reset_verify_create
      description: Verify the code sent by the request-reset endpoint and set a new
        password on the account matching `email`. On success the password is changed
        immediately — log in with `POST /v1/auth/login/` using the new password. Public
        endpoint, rate-limited.
      summary: Verify reset code and set new password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotFound:
                  value:
                    code: not_found
                    message: Resource not found
                    details: null
                  summary: Not found
          description: The requested resource does not exist (or is not visible to
            you).
  /v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Exchange a valid refresh token for a new access token, without
        forcing the user to log in again. Call this whenever a request fails with
        `401 not_authenticated` because the access token expired. Concurrent refresh
        calls with the same token are idempotent (return the same result) to avoid
        session churn. A `refresh` field is only present in the response when the
        refresh token itself was rotated. Public endpoint (the refresh token *is*
        the credential), rate-limited.
      summary: Refresh access token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Revoke the caller's session(s). Pass `refresh` (the refresh token
        of the session being logged out) to revoke just that one session; omit it
        to revoke **all** of the caller's sessions on every device. The client should
        discard its tokens locally after calling this regardless of which mode was
        used.
      summary: Log out
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
            examples:
              LogOutCurrentSessionOnly:
                value:
                  refresh: <refresh_token>
                summary: Log out current session only
              LogOutAllSessions:
                value: {}
                summary: Log out all sessions
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotFound:
                  value:
                    code: not_found
                    message: Resource not found
                    details: null
                  summary: Not found
          description: The requested resource does not exist (or is not visible to
            you).
  /v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Return the signed-in user's profile, the currently resolved tenant
        (via the `X-Tenant-ID` header or fallback), the caller's membership in that
        tenant, every active tenant membership they hold (for a tenant-switcher UI),
        and their effective permission set. `tenant`/`membership` are `null` for pure
        customer accounts with no business affiliation. Call this after login/token-refresh
        to bootstrap the app's session state.
      summary: Get current user
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/ws-ticket/:
    post:
      operationId: auth_ws_ticket_create
      description: Issue a short-lived, single-use ticket for authenticating the realtime
        gateway WebSocket connection, instead of sending the long-lived JWT over the
        WS handshake. Connect with `wss://<host>/ws/?ticket=<ticket>`. Re-request
        a ticket before each new connection attempt — `ttl_seconds` tells you how
        long it stays valid.
      summary: Mint a WebSocket auth ticket
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WsTicketOutputRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WsTicketOutput'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/sessions/:
    get:
      operationId: auth_sessions_list
      description: List the signed-in user's active sessions across devices (for a
        "manage devices" screen). `is_current` flags the session tied to the access
        token used for this request. Not paginated.
      summary: List active sessions
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSessionList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/sessions/revoke-others/:
    post:
      operationId: auth_sessions_revoke_others_create
      description: Bulk-revoke every one of the caller's active sessions **except**
        the one making this request (identified by the access token's `jti`) — a "log
        out of all other devices" action. `revoked` is the count of sessions that
        were terminated. Unlike changing the password, the current session is left
        intact.
      summary: Revoke all other sessions
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeOthersResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
  /v1/auth/sessions/{id}/:
    delete:
      operationId: auth_sessions_destroy
      description: Revoke a single session by id — e.g. "log out this device" from
        the sessions list. Revoking the session tied to the current access token effectively
        logs the caller out.
      summary: Revoke a session
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                PermissionDenied:
                  value:
                    code: permission_denied
                    message: You do not have permission to perform this action
                    details: null
                  summary: Permission denied
          description: Authenticated, but not permitted to perform this action.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotFound:
                  value:
                    code: not_found
                    message: Resource not found
                    details: null
                  summary: Not found
          description: The requested resource does not exist (or is not visible to
            you).
  /v1/user/profile/:
    get:
      operationId: user_profile_retrieve
      description: 'Return the authenticated user''s profile: contact details, address,
        language/timezone/theme preferences and notification settings, plus the read-through
        `email`/`phone` verification flags. Use the `version` in the response for
        the next `PUT`.'
      summary: Get my profile
      parameters:
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - en
          - kk
          - ru
        description: 'Response language for localized fields. Precedence: this ``?lang=``
          query param → the ``Accept-Language`` request header → default ``ru``.'
      tags:
      - Profile
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileOutput'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotFound:
                  value:
                    code: not_found
                    message: Resource not found
                    details: null
                  summary: Not found
          description: The requested resource does not exist (or is not visible to
            you).
    post:
      operationId: user_profile_create
      description: Create the profile for the currently authenticated user. Each user
        may have exactly one profile — calling this again after a profile already
        exists returns `409 conflict`. Most accounts get their profile created automatically
        during onboarding, so mobile clients typically only need `GET`/`PUT`; this
        endpoint exists for accounts that skipped that step.
      summary: Create my profile
      parameters:
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - en
          - kk
          - ru
        description: 'Response language for localized fields. Precedence: this ``?lang=``
          query param → the ``Accept-Language`` request header → default ``ru``.'
      tags:
      - Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileOutput'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
                  summary: Validation error
          description: Validation error — the request body or query params were rejected.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotAuthenticated:
                  value:
                    code: not_authenticated
                    message: Authentication credentials were not provided.
                    details: null
                  summary: Not authenticated
          description: Authentication credentials were missing or invalid.
        '409':
