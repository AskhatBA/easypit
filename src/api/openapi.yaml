components:
  schemas:
    AcceptInviteRequest:
      type: object
      description: |-
        Input serializer for POST /v1/auth/invite/<token>/accept/.

        The invitee sets their own password and (optionally) completes profile
        fields. ``phone_number`` is only needed when the invite was email-only.
      properties:
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          minLength: 8
        full_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          nullable: true
          minLength: 1
        language:
          allOf:
          - $ref: '#/components/schemas/LanguageEnum'
          default: ru
      required:
      - password
      - password_confirm
    AccessTokenResponse:
      type: object
      description: Output serializer for access token refresh.
      properties:
        access:
          type: string
        refresh:
          type: string
          description: New refresh token (only provided if sliding session renewal)
        expires_in:
          type: integer
          description: Access token expiry in seconds
        refresh_expires_in:
          type: integer
