  /v1/carwash/carwashes/:
    get:
      operationId: carwash_carwashes_list
      description: |-
        Paginated, filterable list of customer-visible carwashes. Guest-accessible — no authentication required, but a signed-in customer's favorites are reflected in the response.

        Pass ``?lat=&lng=`` to compute distance from the customer and unlock ``?ordering=distance`` (a Python-level haversine sort — all other ``ordering`` values are applied at the DB level). Both ``lat``/``lng`` must be present and within range (-90..90 / -180..180) or they are silently ignored.
      summary: List / search carwashes
      parameters:
      - in: query
        name: amenity_ids
        schema:
          type: string
        description: Comma-separated amenity UUIDs; carwash must have ALL of them.
      - in: query
        name: city_id
        schema:
          type: string
        description: Filter to carwashes in this city (UUID).
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - en
          - kk
          - ru
        description: 'Response language for localized fields. Precedence: this ``?lang=``
          query param → the ``Accept-Language`` request header → default ``ru``.'
      - in: query
        name: lat
        schema:
          type: number
          format: double
        description: Customer latitude, for distance display/sorting.
      - in: query
        name: lng
        schema:
          type: number
          format: double
        description: Customer longitude, for distance display/sorting.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -created_at
          - -min_price
          - -name
          - -rating
          - created_at
          - distance
          - min_price
          - name
          - rating
        description: Sort key. ``distance`` requires ``?lat=&lng=`` and is computed
          in Python; all other values sort at the DB level.
      - in: query
        name: q
        schema:
          type: string
        description: Free-text search over carwash name, address and city name.
      - in: query
        name: service_category_id
        schema:
          type: string
        description: Only carwashes offering a service in this category (UUID).
      tags:
      - Carwashes
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCarwashListList'
          description: Page of carwashes ({count,next,previous,results}).
  /v1/carwash/map/:
    get:
      operationId: carwash_map_retrieve
      description: Server-side grid-clustered carwash data for rendering a map. Cells
        with 2+ carwashes collapse into a lightweight ``{lat, lng, count}`` cluster;
        a cell with a single carwash is returned as a full list item so the UI can
        draw a real pin. Guest-accessible — no authentication required.
      summary: Get map clusters and points
      parameters:
      - in: query
        name: city_id
        schema:
          type: string
        description: Narrow results to this city (UUID).
      - in: query
        name: east
        schema:
          type: number
          format: double
        description: Bounding box east longitude (degrees). All four bbox params must
          be present to apply.
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - en
          - kk
          - ru
        description: 'Response language for localized fields. Precedence: this ``?lang=``
          query param → the ``Accept-Language`` request header → default ``ru``.'
      - in: query
        name: north
        schema:
          type: number
          format: double
        description: Bounding box north latitude (degrees). All four bbox params must
          be present to apply.
      - in: query
        name: south
        schema:
          type: number
          format: double
        description: Bounding box south latitude (degrees). All four bbox params must
          be present to apply.
      - in: query
        name: west
        schema:
          type: number
          format: double
        description: Bounding box west longitude (degrees). All four bbox params must
          be present to apply.
      - in: query
        name: zoom
        schema:
          type: integer
        description: Map zoom level, drives cluster grid cell size. Clamped to [0,
          20]; default 12.
      tags:
      - Carwashes
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarwashMapResponse'
              examples:
                MapResponse:
                  value:
                    clusters:
                    - lat: 43.238
                      lng: 76.945
                      count: 5
                    points: []
                  summary: Map response
          description: Clusters and individual carwash points for the viewport.
