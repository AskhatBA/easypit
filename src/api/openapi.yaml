        * `sms` - sms
        * `email` - email
    OTPSentResponse:
      type: object
      description: |-
        Response after OTP is sent.

        ``channel`` tells the client how the code is being delivered so the code
        screen can label itself ("we sent a WhatsApp / SMS / email code").
        ``masked_destination`` is a display-only, partially-masked contact for the
        same screen. ``resend_available_in_seconds`` seeds the resend countdown —
        the client may request a new code once it elapses.
      properties:
        message:
          type: string
        expires_in_minutes:
          type: integer
        channel:
          allOf:
          - $ref: '#/components/schemas/OTPDeliveryChannelEnum'
          description: |-
            Delivery channel: whatsapp | sms | email

            * `whatsapp` - whatsapp
            * `sms` - sms
            * `email` - email
        masked_destination:
          type: string
          nullable: true
          description: Masked contact for display, e.g. "+7 707 ••• 45 67" or "a•••@gmail.com"
        resend_available_in_seconds:
          type: integer
          description: Seconds the client must wait before it may request a new code
      required:
      - channel
      - expires_in_minutes
      - masked_destination
      - message
      - resend_available_in_seconds
