    Session:
      type: object
      description: |-
        Output serializer for Session model.

        ``is_current`` is computed by comparing the session's
        ``access_token_jti`` against the ``current_jti`` value injected into the
        serializer context (the jti of the request's access token). ``location``
        is a best-effort, nullable string — no GeoIP resolver exists yet, so it
        is always ``None`` for now (the field is present for forward-compat).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        device_type:
          type: string
        browser:
          type: string
        browser_version:
          type: string
        os:
          type: string
        os_version:
          type: string
        ip_address:
          type: string
        last_activity:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_current:
          type: boolean
          description: True when this session matches the request's access-token jti.
          readOnly: true
        location:
          type: string
          nullable: true
          description: Best-effort human location. Always None until a resolver exists.
          readOnly: true
      required:
      - browser
      - browser_version
      - created_at
      - device_type
      - expires_at
      - id
      - ip_address
      - is_active
      - is_current
      - last_activity
      - location
      - os
      - os_version
