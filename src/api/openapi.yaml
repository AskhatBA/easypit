      - updated_at
      - version
    TenantMembership:
      type: object
      description: Output serializer with standard BaseModel fields.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        version:
          type: integer
          readOnly: true
        tenant:
          allOf:
          - $ref: '#/components/schemas/Tenant'
          readOnly: true
        user_id:
          type: string
          format: uuid
          readOnly: true
        role:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        earning_percent:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        invited_at:
          type: string
          format: date-time
          readOnly: true
        carwash:
          type: object
          additionalProperties: {}
          nullable: true
          description: |-
            Compact ``{id, name}`` of the scoped branch, or ``None``.

            ``None`` means tenant-wide access (owner/admin). Relies on the
            membership queryset ``select_related("carwash")`` to avoid an N+1.

            Tolerates being re-serialized over an already-serialized ``dict``
            (the /me endpoint nests ``TenantMembershipSerializer`` inside
            ``MeResponseSerializer``, so this method may receive its own prior
            output).
          readOnly: true
        profile:
          type: object
          additionalProperties: {}
          nullable: true
          description: |-
            Return a flat snapshot of the linked UserProfile, or None if missing.

            We hit the related object via getattr + try/except because UserProfile
            uses a soft-delete manager that raises ``DoesNotExist`` for deleted
            rows, and not every user has a profile yet (phone-invited users).
          readOnly: true
        status:
          type: string
          description: |-
            Authoritative membership status (G1).

            ``inactive`` when the membership is deactivated; otherwise ``pending``
            until the member is "onboarded" — has a profile with a non-empty
            ``full_name`` AND ``phone_number`` — then ``active``. Replaces the
            client's old ``is_active && !profile`` heuristic.
          readOnly: true
        reactivated:
          type: boolean
          description: |-
            Whether this invite reactivated a prior inactive membership (G4).

            Only the invite endpoint attaches ``_reactivated``; every other
            serialization defaults to ``False``.
          readOnly: true
        invite:
          type: object
          additionalProperties: {}
          nullable: true
          description: |-
            The freshly-issued invite link, only present on the invite response.

            The invite service attaches ``_invitation`` (with a transient
            ``_raw_token``) to the membership it returns; every other serialization
            (lists, detail, /me) has no such attribute and returns ``None``.
          readOnly: true
        capabilities:
          type: object
          additionalProperties: {}
          description: |-
            Advisory per-row action flags for the REQUESTING actor (G7).

            ``{can_edit_role, can_deactivate, can_remove, can_change_scope}`` —
            mirrors the service guards so the UI can disable controls pre-flight.
            The service / bulk ``forbidden`` responses remain the source of truth
            on submit. With no request in context, returns all-false (safe).
          readOnly: true
      required:
      - capabilities
      - carwash
      - created_at
      - earning_percent
      - id
      - invite
      - invited_at
      - is_active
      - profile
      - reactivated
      - role
      - status
      - tenant
      - updated_at
      - user_id
      - version
