        ``ticket`` is the opaque string the client passes as
        ``?ticket=<value>`` when opening the WebSocket. ``ttl_seconds``
        advertises how long it stays valid so the frontend can decide
        whether to re-issue before connecting (e.g. after a retry-with-
        backoff window).
