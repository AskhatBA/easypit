          - kk
          - ru
        description: 'Response language for localized fields. Precedence: this ``?lang=``
          query param → the ``Accept-Language`` request header → default ``ru``.'
      tags:
      - Payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntentRequest'
            examples:
              OptionalReturnURL:
                value:
                  return_url: https://app.easypit.kz/bookings/123/paid
                summary: Optional return URL
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentOutput'
              examples:
                KaspiQRIntent:
                  value:
                    payment_intent_id: 0191a1b2-3c4d-7e5f-8a9b-0c1d2e3f4a5b
                    provider: kaspi
                    status: pending
                    kaspi_qr: https://kaspi.kz/pay/qr/...
                    pay_url: ''
                    amount_kzt: '5000.00'
                  summary: Kaspi QR intent
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    message: Validation failed
                    details:
                      phone:
                      - This field is required.
